name: "🎨 Feature Request / 版型樣式調整"
description: "提出版型、UI、樣式或視覺調整需求"
title: "[樣式調整] "
labels: ["樣式調整"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🎨 Feature Request / 版型樣式調整
        用於提出 UI/版型/樣式調整需求，請填寫必要資訊即可。


  - type: textarea
    id: request_desc
    attributes:
      label: "🎯 需求說明"
      description: "說明目前問題與希望調整的方向"
      value: |
        - 現況/問題：
        - 希望調整方向：
        - 參考依據（若有）：
    validations:
      required: true

  - type: textarea
    id: adjust_items
    attributes:
      label: "📋 調整項目"
      description: "列出要調整的細項（可用 checklist）"
      value: |
        - [ ] 調整項目 1
        - [ ] 調整項目 2
        - [ ] 調整項目 3
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: "📝 備註（選填）"
      description: "補充說明或相關連結/截圖"
      value: |
        - 補充說明：
        - 原始畫面/截圖：
        - 修改後期望畫面/mock：
        - 相關連結：
    validations:
      required: false
