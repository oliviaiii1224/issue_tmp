name: "🛠️ Task / 任務追蹤"
description: "用於追蹤明確可執行的任務或待辦"
title: "[Task] "
labels: ["任務追蹤"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🛠️ Task / 任務追蹤
        用於追蹤具體任務（可拆項、可驗收）。

  - type: textarea
    id: purpose
    attributes:
      label: "🎯 目的"
      description: "為什麼要做這件事？希望帶來什麼改善？"
      placeholder: |
        例如：
        - 提升資料匯入效率，避免同事手動操作出錯。
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 任務項目"
      description: "列出要完成的子任務（可用 checklist）"
      value: |
        - [ ] 任務 1
        - [ ] 任務 2
        - [ ] 任務 3
        - [ ] 任務 4
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: "📝 附註（選填）"
      description: "補充說明、文件連結、截圖或注意事項"
      value: |
        - 相關連結：
        - 注意事項：
        - 其他補充：
    validations:
      required: false
